apiVersion: v1
kind: ConfigMap
metadata:
  name: scoville-config
  namespace: scoville
data:
  # NATS URL — must match the service name and namespace where NATS is deployed.
  # NATS is in the jalapeno namespace alongside GoBMP.
  NATS_URL: "nats://nats.jalapeno.svc.cluster.local:4222"

  # Topology ID assigned to the BMP-learned underlay graph.
  BMP_TOPO: "underlay"

  # JetStream durable consumer name prefix.
  BMP_CONSUMER: "scoville"

  # Southbound encap mode. "host" = no-op (pull via /flows). "tor" = gNMI push.
  ENCAP_MODE: "host"

  # Optional: comma-separated nodeID=host:port for gNMI target resolution
  # when BMP-sourced nodes lack a management_ip annotation.
  # GNMI_TARGET_MAP: "spine-1=192.168.0.1:57400,leaf-1=192.168.0.2:57400"
  GNMI_TARGET_MAP: ""
